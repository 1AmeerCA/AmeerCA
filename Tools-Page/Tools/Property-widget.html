    <script src="taxData.js"></script>
    <!-- main controller script – no conflicts, fully isolated -->
    <script>


        (function() {
            // ensure Property_Tax is loaded from above module
            if (typeof Property_Tax === 'undefined') {
                console.warn("Property_Tax not found, fallback stub");
                window.Property_Tax = { getRate: () => 0, activeYear: 2026 };
            }
            
            // DOM references
            const dom = {
                yearSpan: document.getElementById('capYearDisplay'),
                propInput: document.getElementById('capPropertyAmount'),
                taxSpan: document.getElementById('capTaxValue'),
                rateSpan: document.getElementById('capRateBadge'),
                buyRadio: document.getElementById('capBuyOpt'),
                sellRadio: document.getElementById('capSellOpt'),
                filerRadio: document.getElementById('capFilerOpt'),
                lateRadio: document.getElementById('capLateOpt'),
                nonRadio: document.getElementById('capNonOpt'),
                copyBtn: document.getElementById('capCopyAction'),
                printBtn: document.getElementById('capPrintAction'),
                shareBtn: document.getElementById('capShareAction')
            };
            
            // get current selection
            function getTransaction() {
                return dom.buyRadio.checked ? 'BUY' : 'SELL';
            }
            function getFilerStatus() {
                if (dom.filerRadio.checked) return 'FILER';
                if (dom.lateRadio.checked) return 'LATE';
                return 'NON';
            }
            
            // core update engine
            function computeAndRender() {
                try {
                    // update year from centralized module
                    if (Property_Tax.activeYear) {
                        dom.yearSpan.innerText = `TAX YEAR ${Property_Tax.activeYear}`;
                    } else {
                        dom.yearSpan.innerText = `TAX YEAR 2026`;
                    }
                    
                    let rawValue = dom.propInput.value.trim();
                    let propValue = rawValue === '' ? 0 : parseFloat(rawValue);
                    if (isNaN(propValue)) propValue = 0;
                    propValue = Math.max(0, propValue);
                    
                    const trans = getTransaction();
                    const status = getFilerStatus();
                    
                    let rate = Property_Tax.getRate(trans, status, propValue);
                    if (typeof rate !== 'number' || isNaN(rate)) rate = 0;
                    
                    const taxAmount = (propValue * rate) / 100;
                    
                    // format currency (PKR, no decimals)
                    dom.taxSpan.innerText = "Rs. " + taxAmount.toLocaleString(undefined, { maximumFractionDigits: 0, minimumFractionDigits: 0 });
                    dom.rateSpan.innerText = rate + "%";
                    
                    // dynamic styling for rate badge (trust/urgency)
                    if (status === 'NON') {
                        dom.rateSpan.style.background = "#9b4b36";
                    } else if (status === 'LATE') {
                        dom.rateSpan.style.background = "#bf8826";
                    } else {
                        dom.rateSpan.style.background = "var(--Black)";
                    }
                } catch(e) {
                    dom.taxSpan.innerText = "Rs. 0";
                    dom.rateSpan.innerText = "0%";
                }
            }
            
            // attach listeners
            function bindEvents() {
                const radioInputs = [dom.buyRadio, dom.sellRadio, dom.filerRadio, dom.lateRadio, dom.nonRadio];
                radioInputs.forEach(radio => {
                    if (radio) radio.addEventListener('change', computeAndRender);
                });
                if (dom.propInput) dom.propInput.addEventListener('input', computeAndRender);
            }
            
            // interactive actions (copy, print, share) – non-conflicting
            function copyTax() {
                const taxText = dom.taxSpan.innerText;
                if (!taxText) return;
                navigator.clipboard.writeText(taxText).then(() => {
                    // subtle visual feedback
                    const original = dom.taxSpan.style.transition;
                    dom.taxSpan.style.transform = "scale(0.98)";
                    setTimeout(() => { dom.taxSpan.style.transform = ""; }, 120);
                }).catch(() => alert("Manual copy: " + taxText));
            }
            
            function printSummary() {
                const originalTitle = document.title;
                document.title = "Capital Tax Estimate";
                window.print();
                document.title = originalTitle;
            }
            
            function shareWidget() {
                const taxAmount = dom.taxSpan.innerText;
                const shareMsg = `Capital Gains Tax (FY${Property_Tax.activeYear || 2026}) → ${taxAmount}. Based on Income Tax Ordinance u/s 236C/236K.`;
                if (navigator.share) {
                    navigator.share({ title: 'Tax Pro Calculator', text: shareMsg, url: window.location.href }).catch(()=>{});
                } else {
                    navigator.clipboard.writeText(shareMsg + " " + window.location.href);
                    alert("Calculation summary copied to clipboard");
                }
            }
            
            function attachActions() {
                if (dom.copyBtn) dom.copyBtn.addEventListener('click', copyTax);
                if (dom.printBtn) dom.printBtn.addEventListener('click', printSummary);
                if (dom.shareBtn) dom.shareBtn.addEventListener('click', shareWidget);
            }
            
            // initial setup
            function init() {
                bindEvents();
                attachActions();
                // set default numeric placeholder if empty
                if (dom.propInput && (dom.propInput.value === "" || dom.propInput.value === null)) {
                    dom.propInput.value = "0";
                }
                computeAndRender();
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
            
            // optional safe global reference (non-conflicting)
            window.__CapitalTaxPro = { refresh: computeAndRender };
        })();
    </script>
